<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Localizações - Viz RPG</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    color: white;
}

header {
    background-color: #111;
    padding: 20px;
    text-align: center;
    border-bottom: 3px solid #8a2be2;
}

nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
}

nav a {
    color: #ccc;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: #8a2be2;
}

section {
    padding: 40px 20px;
    text-align: center;
}

.card {
    background-color: #2f2f4f;
    padding: 20px;
    width: 300px;
    border-radius: 10px;
    margin: 20px auto;
    box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
}

footer {
    background-color: #111;
    text-align: center;
    padding: 15px;
    margin-top: 40px;
    border-top: 2px solid #8a2be2;
}
</style>
</head>

<body>

<header>
    <h1>Viz RPG</h1>
    <h3>Localizações</h3>

    <nav>
        <a href="{{ url_for('home') }}">Início</a>
        <a href="{{ url_for('bestiary') }}">Bestiário</a>
        <a href="{{ url_for('register') }}">Cadastro</a>
    </nav>
</header>

<section>
    <h2>Locais do Mundo</h2>

    {% for location in locations %}
    <div class="card">
        <h3>{{ location.name }}</h3>
        <p><strong>Região:</strong> {{ location.region }}</p>
        <p>{{ location.description }}</p>
    </div>
    {% endfor %}

</section>

<footer>
    <p>© 2026 Viz RPG</p>
</footer>

</body>
</html>
