<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - Viz RPG</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    color: white;
}

header {
    background-color: #111;
    padding: 20px;
    text-align: center;
    border-bottom: 3px solid #8a2be2;
}

nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
}

nav a {
    color: #ccc;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: #8a2be2;
}

section {
    padding: 40px 20px;
    text-align: center;
}

form {
    max-width: 400px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

input, textarea, select {
    padding: 10px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px;
    background-color: #8a2be2;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #6a1bb8;
}

footer {
    background-color: #111;
    text-align: center;
    padding: 15px;
    margin-top: 40px;
    border-top: 2px solid #8a2be2;
}
</style>
</head>

<body>

<header>
    <h1>Viz RPG</h1>
    <h3>Cadastro</h3>

    <nav>
        <a href="{{ url_for('home') }}">Início</a>
        <a href="{{ url_for('bestiary') }}">Bestiário</a>
        <a href="{{ url_for('locations') }}">Localizações</a>
    </nav>
</header>

<section>
    <h2>Cadastrar Nova Criatura</h2>

    <form method="POST">
        <input type="text" name="name" placeholder="Nome" required>
        <input type="text" name="type" placeholder="Tipo" required>
        <input type="number" name="level" placeholder="Nível" required>
        <textarea name="description" placeholder="Descrição" required></textarea>
        <button type="submit">Cadastrar</button>
    </form>

</section>

<footer>
    <p>© 2026 Viz RPG</p>
</footer>

</body>
</html>
