{% extends 'base.html' %}
{% block content %}
<h2>Cadastro de jogos</h2>
<hr>

<form action="{{ url_for('cadgames') }}" method="POST" class="container mt-4">

<div class="mb-3">
    <label class="form-label">Título</label>
    <input type="text" name="titulo" class="form-control" placeholder="Insira o nome do jogo" required>
</div>

<div class="mb-3">
    <label class="form-label">Ano</label>
    <input type="number" name="ano" class="form-control" placeholder="Insira o ano de lançamento" required>
</div>

<div class="mb-3">
    <label class="form-label">Categoria</label>
    <input type="text" name="categoria" class="form-control" placeholder="Insira a categoria do jogo" required>
</div>

<div class="d-flex gap-2">
    <button type="submit" class="btn btn-success">Cadastrar</button>
    <button type="reset" class="btn btn-secondary">Limpar</button>
</div>

</form>

<hr>

<table class="table table-bordered table-hover">
    <thead>
        <tr>
            <td>Titulo</td>
            <td>Ano</td>
            <td>Categoria</td>
        </tr>
    </thead>
    <tbody>
        {% for game in listaGames %}
        <tr>
            <td>{{game.titulo}}</td>
            <td>{{game.ano}}</td>
            <td>{{game.categoria}}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock content %}
