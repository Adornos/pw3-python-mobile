<!-- Importação do Template -->
{% extends 'base.html' %} {% block content %}
<main>
  <h1>Jogos em destaque</h1>
  <hr />
  <p><a href="/">Voltar</a></p>

  <ul>
    {%for chave, valor in game.items()%}
    <details>
      <summary>{{chave}}</summary>
      <p>{{chave}}: {{valor}}</p>
    </details>
    {%endfor%}
  </ul>
    <h2>Top Players Ranking:</h2>
    <ol>
    {% for jogador in jogadores %}
    <li>{{ jogador }}</li>
    {% endfor %}
    </ol>
</main>

{% endblock content %}
